name: Release (CLI & Desktop)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. CLI release by GoReleaser
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. desktop_go release assets, named like .goreleaser.yml archives
  build-desktop-go:
    name: Build desktop_go (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            goos: linux
            goarch: amd64
            cgo_enabled: 1
            binary_name: music-dl-desktop-go
            archive_name: music-dl-desktop-go_linux_amd64.tar.gz
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            cgo_enabled: 1
            binary_name: music-dl-desktop-go
            archive_name: music-dl-desktop-go_darwin_amd64.tar.gz
          - runner: macos-14
            goos: darwin
            goarch: arm64
            cgo_enabled: 1
            binary_name: music-dl-desktop-go
            archive_name: music-dl-desktop-go_darwin_arm64.tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            cgo_enabled: 0
            binary_name: music-dl-desktop-go.exe
            archive_name: music-dl-desktop-go_windows_amd64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Linux Dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Prepare Windows Resources
        if: matrix.goos == 'windows'
        shell: powershell
        run: |
          go install github.com/tc-hib/go-winres@latest
          go generate ./...
          go-winres make --in .\winres\desktop_go.winres.json --out .\desktop_go\rsrc

      - name: Build desktop_go (Unix)
        if: matrix.goos != 'windows'
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "./dist/${{ matrix.binary_name }}" ./desktop_go
        env:
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Build desktop_go (Windows)
        if: matrix.goos == 'windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          go build -trimpath -ldflags "-H windowsgui -s -w" -o ".\dist\${{ matrix.binary_name }}" ./desktop_go
        env:
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Package desktop_go (Linux)
        if: matrix.goos == 'linux'
        run: |
          package_root="music-dl-desktop-go_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${package_root}/usr/bin"
          mkdir -p "dist/${package_root}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "dist/${package_root}/usr/share/applications"
          cp "./dist/${{ matrix.binary_name }}" "dist/${package_root}/usr/bin/music-dl-desktop-go"
          cp "./desktop/icon.png" "dist/${package_root}/usr/share/icons/hicolor/256x256/apps/music-dl-desktop-go.png"
          cp "./desktop_go/app.desktop" "dist/${package_root}/usr/share/applications/music-dl-desktop-go.desktop"
          tar -C dist -czf "${{ matrix.archive_name }}" "${package_root}"

      - name: Package desktop_go (macOS)
        if: matrix.goos == 'darwin'
        run: |
          package_root="music-dl-desktop-go_${{ matrix.goos }}_${{ matrix.goarch }}"
          app_dir="dist/${package_root}/music-dl-desktop-go.app"
          mkdir -p "${app_dir}/Contents/MacOS"
          mkdir -p "${app_dir}/Contents/Resources"
          cp "./dist/${{ matrix.binary_name }}" "${app_dir}/Contents/MacOS/music-dl-desktop-go"
          chmod +x "${app_dir}/Contents/MacOS/music-dl-desktop-go"

          mkdir -p music-dl-desktop-go.iconset
          sips -z 16 16 desktop/icon.png --out music-dl-desktop-go.iconset/icon_16x16.png
          sips -z 32 32 desktop/icon.png --out music-dl-desktop-go.iconset/icon_16x16@2x.png
          sips -z 32 32 desktop/icon.png --out music-dl-desktop-go.iconset/icon_32x32.png
          sips -z 64 64 desktop/icon.png --out music-dl-desktop-go.iconset/icon_32x32@2x.png
          sips -z 128 128 desktop/icon.png --out music-dl-desktop-go.iconset/icon_128x128.png
          sips -z 256 256 desktop/icon.png --out music-dl-desktop-go.iconset/icon_128x128@2x.png
          sips -z 256 256 desktop/icon.png --out music-dl-desktop-go.iconset/icon_256x256.png
          sips -z 512 512 desktop/icon.png --out music-dl-desktop-go.iconset/icon_256x256@2x.png
          sips -z 512 512 desktop/icon.png --out music-dl-desktop-go.iconset/icon_512x512.png
          iconutil -c icns music-dl-desktop-go.iconset -o "${app_dir}/Contents/Resources/music-dl-desktop-go.icns"

          cat > "${app_dir}/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>music-dl-desktop-go</string>
            <key>CFBundleIdentifier</key>
            <string>com.guohuiyuan.musicdl.desktopgo</string>
            <key>CFBundleName</key>
            <string>music-dl-desktop-go</string>
            <key>CFBundleDisplayName</key>
            <string>music-dl-desktop-go</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleIconFile</key>
            <string>music-dl-desktop-go</string>
          </dict>
          </plist>
          EOF

          codesign --force --deep --sign - "${app_dir}" || true
          tar -C dist -czf "${{ matrix.archive_name }}" "${package_root}"

      - name: Package desktop_go (Windows)
        if: matrix.goos == 'windows'
        shell: powershell
        run: |
          Compress-Archive -Path ".\dist\${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Verify desktop_go package (Linux)
        if: matrix.goos == 'linux'
        run: |
          tar -tzf "${{ matrix.archive_name }}" | grep -F "usr/share/icons/hicolor/256x256/apps/music-dl-desktop-go.png"
          tar -tzf "${{ matrix.archive_name }}" | grep -F "usr/share/applications/music-dl-desktop-go.desktop"

      - name: Verify desktop_go package (macOS)
        if: matrix.goos == 'darwin'
        run: |
          tar -tzf "${{ matrix.archive_name }}" | grep -F "music-dl-desktop-go.app/Contents/Resources/music-dl-desktop-go.icns"
          tar -tzf "${{ matrix.archive_name }}" | grep -F "music-dl-desktop-go.app/Contents/Info.plist"

      - name: Verify desktop_go package (Windows)
        if: matrix.goos == 'windows'
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path ".\dist\${{ matrix.binary_name }}"))
          if ($null -eq $icon) { throw "desktop_go executable has no icon" }
          if ($icon.Size.Width -lt 16 -or $icon.Size.Height -lt 16) { throw "desktop_go icon is unexpectedly small" }

      - name: Upload desktop_go Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}

  # 3. Windows desktop build
  build-windows-desktop:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch_name: amd64
          - target: i686-pc-windows-msvc
            arch_name: 386
          - target: aarch64-pc-windows-msvc
            arch_name: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Build Go Backend
        run: |
          go build -ldflags "-s -w" -o music-dl.exe ./cmd/music-dl
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: ${{ matrix.arch_name }}

      - name: Build Rust Desktop
        run: |
          cd desktop
          cargo build --release --target ${{ matrix.target }}

      - name: Package Desktop
        shell: powershell
        run: |
          mkdir dist
          copy desktop/target/${{ matrix.target }}/release/music-dl-desktop-rust.exe dist/music-dl-desktop-rust.exe
          Compress-Archive -Path dist/* -DestinationPath music-dl-desktop-rust-windows-${{ matrix.arch_name }}.zip

      - name: Verify Desktop Icon
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon((Resolve-Path ".\desktop\target\${{ matrix.target }}\release\music-dl-desktop-rust.exe"))
          if ($null -eq $icon) { throw "desktop executable has no icon" }
          if ($icon.Size.Width -lt 16 -or $icon.Size.Height -lt 16) { throw "desktop icon is unexpectedly small" }

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: music-dl-desktop-rust-windows-${{ matrix.arch_name }}.zip

  # 4. macOS desktop build
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch_name: amd64
          - target: aarch64-apple-darwin
            arch_name: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install Packaging Tools
        run: brew install create-dmg

      - name: Build Go Backend
        run: |
          go build -ldflags "-s -w" -o music-dl ./cmd/music-dl
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: ${{ matrix.arch_name }}

      - name: Build Rust Desktop
        run: |
          cd desktop
          cargo build --release --target ${{ matrix.target }}

      - name: Create DMG & PKG
        run: |
          mkdir -p bundle/music-dl-desktop-rust.app/Contents/MacOS
          mkdir -p bundle/music-dl-desktop-rust.app/Contents/Resources
          mkdir -p bundle/dmg-root

          cp desktop/target/${{ matrix.target }}/release/music-dl-desktop-rust bundle/music-dl-desktop-rust.app/Contents/MacOS/music-dl-desktop-rust
          chmod +x bundle/music-dl-desktop-rust.app/Contents/MacOS/music-dl-desktop-rust

          mkdir MusicDL.iconset
          sips -z 16 16 desktop/icon.png --out MusicDL.iconset/icon_16x16.png
          sips -z 32 32 desktop/icon.png --out MusicDL.iconset/icon_16x16@2x.png
          sips -z 32 32 desktop/icon.png --out MusicDL.iconset/icon_32x32.png
          sips -z 64 64 desktop/icon.png --out MusicDL.iconset/icon_32x32@2x.png
          sips -z 128 128 desktop/icon.png --out MusicDL.iconset/icon_128x128.png
          sips -z 256 256 desktop/icon.png --out MusicDL.iconset/icon_128x128@2x.png
          sips -z 256 256 desktop/icon.png --out MusicDL.iconset/icon_256x256.png
          sips -z 512 512 desktop/icon.png --out MusicDL.iconset/icon_256x256@2x.png
          sips -z 512 512 desktop/icon.png --out MusicDL.iconset/icon_512x512.png
          iconutil -c icns MusicDL.iconset -o bundle/music-dl-desktop-rust.app/Contents/Resources/music-dl-desktop-rust.icns

          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>music-dl-desktop-rust</string><key>CFBundleIdentifier</key><string>com.guohuiyuan.musicdl.desktoprust</string><key>CFBundleName</key><string>music-dl-desktop-rust</string><key>CFBundleIconFile</key><string>music-dl-desktop-rust</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>0.1.0</string><key>LSUIElement</key><true/></dict></plist>' > bundle/music-dl-desktop-rust.app/Contents/Info.plist

          codesign --force --deep --sign - bundle/music-dl-desktop-rust.app || true

          cp -R bundle/music-dl-desktop-rust.app bundle/dmg-root/
          create-dmg --volname "music-dl-desktop-rust Installer" --window-pos 200 120 --window-size 800 400 --app-drop-link 600 185 "music-dl-desktop-rust-macos-${{ matrix.arch_name }}.dmg" "bundle/dmg-root"
          productbuild --component bundle/music-dl-desktop-rust.app /Applications "music-dl-desktop-rust-macos-${{ matrix.arch_name }}.pkg"

      - name: Verify macOS Desktop Icon
        run: |
          test -f bundle/music-dl-desktop-rust.app/Contents/Resources/music-dl-desktop-rust.icns
          test -f bundle/music-dl-desktop-rust.app/Contents/Info.plist

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            music-dl-desktop-rust-macos-*.dmg
            music-dl-desktop-rust-macos-*.pkg

  # 5. Linux desktop build
  build-linux-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev imagemagick libfuse2 rpm
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build Go Backend
        run: go build -ldflags "-s -w" -o music-dl ./cmd/music-dl
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64

      - name: Build Rust Desktop
        run: |
          cd desktop
          cargo build --release

      - name: Package Desktop (Deb, RPM, AppImage)
        run: |
          cd desktop
          cargo deb --no-build --output ../music-dl-desktop-rust-linux-amd64.deb

          cargo generate-rpm
          mv target/generate-rpm/*.rpm ../music-dl-desktop-rust-linux-amd64.rpm

          cd ..
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
          mkdir -p AppDir/usr/share/applications/
          cp desktop/target/release/music-dl-desktop-rust AppDir/usr/bin/music-dl-desktop-rust
          convert desktop/icon.png -resize 256x256! AppDir/usr/share/icons/hicolor/256x256/apps/music-dl-desktop-rust.png
          echo -e "[Desktop Entry]\nType=Application\nName=music-dl-desktop-rust\nExec=music-dl-desktop-rust\nIcon=music-dl-desktop-rust\nCategories=AudioVideo;" > AppDir/usr/share/applications/music-dl-desktop-rust.desktop

          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/music-dl-desktop-rust.png --desktop-file AppDir/usr/share/applications/music-dl-desktop-rust.desktop
          appimage=$(find . -maxdepth 1 -type f -name '*.AppImage' ! -name 'linuxdeploy-x86_64.AppImage' | head -n 1)
          mv "$appimage" music-dl-desktop-rust-linux-amd64.AppImage

      - name: Verify Linux Desktop Icons
        run: |
          dpkg-deb -c music-dl-desktop-rust-linux-amd64.deb | grep -F "usr/share/icons/hicolor/256x256/apps/music-dl-desktop-rust.png"
          rpm -qlp music-dl-desktop-rust-linux-amd64.rpm | grep -F "/usr/share/icons/hicolor/256x256/apps/music-dl-desktop-rust.png"
          ./music-dl-desktop-rust-linux-amd64.AppImage --appimage-extract > /dev/null
          test -f squashfs-root/usr/share/icons/hicolor/256x256/apps/music-dl-desktop-rust.png
          rm -rf squashfs-root

      - name: Upload Desktop Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm
            music-dl-desktop-rust-linux-amd64.AppImage
